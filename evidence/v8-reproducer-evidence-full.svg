<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 42px; font-weight: 800; fill: #f8fafc; }
      .subtitle { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 21px; fill: #cbd5e1; }
      .label { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; fill: #f8fafc; }
      .body { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #dbeafe; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; fill: #e5e7eb; }
      .smallmono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #cbd5e1; }
      .muted { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="1080" cy="120" r="220" fill="#3b82f6" opacity="0.14"/>
  <circle cx="170" cy="700" r="250" fill="#14b8a6" opacity="0.11"/>

  <text x="64" y="82" class="title">V8 Wasm SIMD Reproducer Evidence</text>
  <text x="64" y="118" class="subtitle">Turboshaft demanded-byte analysis miscompilation on ARM64</text>

  <g transform="translate(64,154)">
    <rect width="1152" height="76" rx="20" fill="#020617" opacity="0.72" filter="url(#shadow)"/>
    <text x="28" y="31" class="label">Upstream status</text>
    <text x="28" y="58" class="body">Chromium issue 508025392. Fixed by V8 CL 7806230 with regression test regress-simd-508025392.js.</text>
    <rect x="932" y="21" width="184" height="34" rx="17" fill="url(#good)"/>
    <text x="960" y="44" class="label">FIX LANDED</text>
  </g>

  <g transform="translate(64,262)">
    <rect width="548" height="360" rx="26" fill="#111827" opacity="0.94" filter="url(#shadow)"/>
    <rect x="0" y="0" width="548" height="8" rx="4" fill="url(#bad)"/>
    <text x="30" y="50" class="label">Vulnerable optimized-tier run</text>
    <text x="30" y="82" class="muted">d8 --allow-natives-syntax poc-wasm-shuffle-security-impact.js</text>
    <rect x="30" y="112" width="488" height="178" rx="16" fill="#020617"/>
    <text x="50" y="145" class="mono">baseline vs optimized</text>
    <text x="50" y="175" class="smallmono">branch: 0x00001111 -> 0x00003333</text>
    <text x="50" y="201" class="smallmono">index:  0x00001111 -> 0x00003333</text>
    <text x="50" y="227" class="smallmono">write:  mem[1]      -> mem[3]</text>
    <text x="50" y="253" class="smallmono">read:   0x00000001 -> 0x00000042</text>
    <text x="50" y="279" class="smallmono">trap:   returns     -> out-of-bounds trap</text>
    <text x="30" y="326" class="body">Result: branch, table index, memory read/write,</text>
    <text x="30" y="350" class="body">large-offset, and trap behavior all diverged.</text>
  </g>

  <g transform="translate(668,262)">
    <rect width="548" height="360" rx="26" fill="#111827" opacity="0.94" filter="url(#shadow)"/>
    <rect x="0" y="0" width="548" height="8" rx="4" fill="url(#good)"/>
    <text x="30" y="50" class="label">Control run</text>
    <text x="30" y="82" class="muted">d8 --nowasm-simd-opt --allow-natives-syntax</text>
    <rect x="30" y="112" width="488" height="178" rx="16" fill="#020617"/>
    <text x="50" y="145" class="mono">same reproducer with optimization disabled</text>
    <text x="50" y="175" class="smallmono">branch: did not diverge</text>
    <text x="50" y="201" class="smallmono">index: did not diverge</text>
    <text x="50" y="227" class="smallmono">controlled write: did not diverge</text>
    <text x="50" y="253" class="smallmono">controlled read: did not diverge</text>
    <text x="50" y="279" class="smallmono">trap behavior: did not diverge</text>
    <text x="30" y="326" class="body">Interpretation: the mismatch is isolated to the</text>
    <text x="30" y="350" class="body">Wasm SIMD optimization path, not baseline Wasm.</text>
  </g>

  <g transform="translate(64,656)">
    <rect width="1152" height="52" rx="18" fill="#020617" opacity="0.62"/>
    <text x="26" y="33" class="muted">Root cause: demanded-byte propagation through low-half widening reduced input demand too aggressively.</text>
  </g>
</svg>
